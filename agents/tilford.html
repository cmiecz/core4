<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MFA // AGENT TILFORD</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#33ff66;
    --green-dim:#1faa42;
    --green-glow:rgba(51,255,102,0.55);
    --bg:#000600;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{min-height:100%;}
  body{
    background:var(--bg);
    color:var(--green);
    font-family:'Share Tech Mono', monospace;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:20px;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,20,0,0.35) 3px,rgba(0,0,0,0) 4px);
    pointer-events:none;z-index:9998;animation:flicker .15s infinite;
  }
  body::after{
    content:"";position:fixed;inset:0;
    background:radial-gradient(ellipse at center,rgba(0,0,0,0) 55%,rgba(0,0,0,0.85) 100%);
    pointer-events:none;z-index:9997;
  }
  @keyframes flicker{0%{opacity:.92;}50%{opacity:1;}100%{opacity:.95;}}
  .screen{
    width:min(820px,94vw);
    position:relative;z-index:1;
    text-shadow:0 0 6px var(--green-glow);
    padding:30px 26px;
  }
  .header-line{
    font-family:'VT323',monospace;font-size:22px;letter-spacing:1px;
    border-bottom:1px solid var(--green-dim);padding-bottom:8px;margin-bottom:20px;
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;
  }
  .msg-text{font-size:clamp(16px,2.5vw,22px);line-height:1.9;white-space:pre-wrap;min-height:120px;}
  .big{font-family:'VT323',monospace;font-size:clamp(32px,7vw,60px);letter-spacing:2px;display:block;}
  .agent-tag{color:var(--green-dim);letter-spacing:3px;font-size:14px;margin-bottom:6px;}
  #countdown-wrap{display:none;margin-top:22px;}
  #countdown{font-family:'VT323',monospace;font-size:clamp(40px,9vw,84px);letter-spacing:4px;text-shadow:0 0 14px var(--green-glow);line-height:1;}
  .cd-labels{display:flex;gap:clamp(18px,7vw,64px);font-size:13px;letter-spacing:3px;color:var(--green-dim);margin-top:6px;padding-left:4px;}
  .album-btn{
    display:none;margin-top:30px;
    font-family:'VT323',monospace;font-size:28px;letter-spacing:2px;
    background:transparent;border:2px solid var(--green);color:var(--green);
    padding:14px 34px;cursor:pointer;text-decoration:none;
    box-shadow:0 0 14px var(--green-glow);transition:.2s;
  }
  .album-btn:hover{background:var(--green);color:#000;}
  .album-btn.show{display:inline-block;}
  .badge-wrap{
    opacity:0;
    visibility:hidden;
    transition:opacity 1.2s ease;
  }
  .badge-wrap.show{opacity:1;visibility:visible;}
  .badge-label{
    font-family:'VT323',monospace;font-size:20px;letter-spacing:3px;
    color:var(--green-dim);margin-bottom:10px;
  }
  .badge-frame{
    position:relative;
    display:inline-block;
    max-width:340px;width:80%;
    border:2px solid var(--green);
    box-shadow:0 0 18px var(--green-glow), inset 0 0 18px rgba(51,255,102,0.15);
    padding:6px;
    background:#000;
  }
  .badge-frame img{display:block;width:100%;height:auto;}
  /* corner brackets */
  .badge-frame::before,.badge-frame::after{
    content:"";position:absolute;width:22px;height:22px;border:2px solid var(--green);
  }
  .badge-frame::before{top:-2px;left:-2px;border-right:none;border-bottom:none;}
  .badge-frame::after{bottom:-2px;right:-2px;border-left:none;border-top:none;}
  /* scanning line sweep */
  .scanline{
    position:absolute;left:0;right:0;height:3px;
    background:var(--green);box-shadow:0 0 12px var(--green-glow);
    top:0;opacity:.85;
    animation:scan 3s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes scan{
    0%{top:0%;}50%{top:98%;}100%{top:0%;}
  }
  /* two-column layout: badge left, content right */
  .layout{
    display:flex;
    gap:36px;
    align-items:flex-start;
    margin-top:24px;
    flex-wrap:wrap;
  }
  .badge-wrap{
    flex:0 0 300px;
    order:1;
  }
  .content-col{
    flex:1 1 340px;
    order:2;
    min-width:300px;
  }
  /* on narrow screens, stack: content first, badge below */
  @media(max-width:760px){
    .layout{gap:24px;}
    .badge-wrap{flex:1 1 100%;order:2;display:flex;flex-direction:column;align-items:center;}
    .content-col{flex:1 1 100%;order:1;}
    .badge-frame{max-width:300px;}
  }
  .badge-frame{max-width:300px;width:100%;}
  /* tap-to-begin gate */
  #startGate{
    position:fixed;inset:0;z-index:9999;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    background:rgba(0,6,0,0.96);
    cursor:pointer;
    text-shadow:0 0 8px var(--green-glow);
  }
  #startGate .gate-inner{text-align:center;}
  #startGate .gate-title{
    font-family:'VT323',monospace;font-size:clamp(34px,8vw,64px);letter-spacing:3px;
    animation:blink 1.2s steps(1) infinite;
  }
  #startGate .gate-sub{
    font-family:'Share Tech Mono',monospace;font-size:15px;letter-spacing:2px;
    color:var(--green-dim);margin-top:14px;
  }
  @keyframes blink{50%{opacity:.25;}}
  #muteBtn{
    position:fixed;top:14px;right:14px;z-index:9999;
    font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:1px;
    background:rgba(0,6,0,0.6);border:1px solid var(--green-dim);color:var(--green);
    padding:6px 12px;cursor:pointer;text-shadow:0 0 6px var(--green-glow);
    display:none;
  }
  #muteBtn.show{display:block;}
</style>
</head>
<body>
  <div id="startGate">
    <div class="gate-inner">
      <div class="gate-title">► TAP TO BEGIN</div>
      <div class="gate-sub">SECURE AUDIO CHANNEL // TAP TO INITIALIZE</div>
    </div>
  </div>
  <button id="muteBtn">♪ SOUND: ON</button>
  <div class="screen">
    <div class="header-line">
      <span>MIND FACTORY AGENCY</span>
      <span>AGENT TILFORD // CT-043</span>
    </div>
    <div class="layout">
      <!-- LEFT: Agent ID badge -->
      <div class="badge-wrap" id="badgeWrap">
        <div class="badge-label">► AGENT ID CREDENTIAL</div>
        <div class="badge-frame">
          <div class="scanline"></div>
          <img src="../badges/tilford.png" alt="Agent TILFORD ID badge">
        </div>
      </div>

      <!-- RIGHT: message, countdown, button -->
      <div class="content-col">
        <div class="msg-text" id="msg"></div>

        <div id="countdown-wrap">
          <div id="countdown">--:--:--:--</div>
          <div class="cd-labels"><span>DAYS</span><span>HRS</span><span>MIN</span><span>SEC</span></div>
        </div>

        <a class="album-btn" id="albumBtn" href="https://photos.app.goo.gl/E5QZt88VVq8JuwR98" target="_blank" rel="noopener">► OPEN MISSION FILES</a>
      </div>
    </div>
  </div>

<script>
/* ============ AUDIO ENGINE (Web Audio API) ============ */
let AC = null;          // AudioContext
let musicGain = null;   // master music volume
let soundOn = true;
let musicStarted = false;

function initAudio(){
  if(AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = AC.createGain();
  musicGain.gain.value = 0.0;
  musicGain.connect(AC.destination);
}

/* --- typewriter click: short filtered noise burst --- */
function clickSound(){
  if(!AC || !soundOn) return;
  const dur = 0.018;
  const buf = AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<data.length;i++){
    data[i] = (Math.random()*2-1) * Math.pow(1 - i/data.length, 2);
  }
  const src = AC.createBufferSource(); src.buffer = buf;
  const hp = AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=1200;
  const g = AC.createGain(); g.gain.value = 0.16 + Math.random()*0.05;
  src.connect(hp); hp.connect(g); g.connect(AC.destination);
  src.start();
}

/* --- carriage 'ding' at end of a line --- */
function dingSound(){
  if(!AC || !soundOn) return;
  const o = AC.createOscillator(); o.type='sine'; o.frequency.value=1760;
  const g = AC.createGain(); g.gain.value=0.0;
  o.connect(g); g.connect(AC.destination);
  const t = AC.currentTime;
  g.gain.linearRampToValueAtTime(0.12, t+0.005);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.35);
  o.start(t); o.stop(t+0.36);
}

/* --- looping spy/synth theme: pulsing bass + tension pad + arp --- */
function startMusic(){
  if(!AC || musicStarted) return;
  musicStarted = true;
  musicGain.gain.linearRampToValueAtTime(0.5, AC.currentTime + 2.0);

  const root = 55; // A1
  // Pulsing bass (eighth notes)
  const bassOsc = AC.createOscillator(); bassOsc.type='sawtooth'; bassOsc.frequency.value=root;
  const bassFilt = AC.createBiquadFilter(); bassFilt.type='lowpass'; bassFilt.frequency.value=420; bassFilt.Q.value=6;
  const bassGain = AC.createGain(); bassGain.gain.value=0;
  bassOsc.connect(bassFilt); bassFilt.connect(bassGain); bassGain.connect(musicGain);
  bassOsc.start();
  const beat = 0.34; // ~ tempo
  function pulse(time, step){
    // simple ominous progression by shifting root every 8 beats
    const prog = [0, 0, 3, 3, -2, -2, 5, 3];
    const semis = prog[step % prog.length];
    bassOsc.frequency.setValueAtTime(root * Math.pow(2, semis/12), time);
    bassGain.gain.setValueAtTime(0.0001, time);
    bassGain.gain.exponentialRampToValueAtTime(0.5, time+0.02);
    bassGain.gain.exponentialRampToValueAtTime(0.02, time+beat*0.8);
  }
  // Tension pad (slow detuned chord)
  [0,7,12].forEach((semi,i)=>{
    const o=AC.createOscillator(); o.type='triangle';
    o.frequency.value = root*2*Math.pow(2,semi/12) * (1 + (i-1)*0.004);
    const g=AC.createGain(); g.gain.value=0.06;
    o.connect(g); g.connect(musicGain); o.start();
  });
  // High arpeggio blips (sparse, spy-ish)
  const arpFilt = AC.createBiquadFilter(); arpFilt.type='bandpass'; arpFilt.frequency.value=2400; arpFilt.Q.value=4;
  arpFilt.connect(musicGain);
  function blip(time, semi){
    const o=AC.createOscillator(); o.type='square'; o.frequency.value = root*8*Math.pow(2,semi/12);
    const g=AC.createGain(); g.gain.value=0;
    o.connect(g); g.connect(arpFilt);
    g.gain.setValueAtTime(0.0001,time);
    g.gain.exponentialRampToValueAtTime(0.05,time+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,time+0.18);
    o.start(time); o.stop(time+0.2);
  }
  // Scheduler
  let step = 0;
  let nextTime = AC.currentTime + 0.1;
  const arpPat = [12,15,19,15,17,12,19,24];
  setInterval(()=>{
    const ahead = AC.currentTime + 0.5;
    while(nextTime < ahead){
      pulse(nextTime, step);
      if(step % 2 === 0) blip(nextTime, arpPat[(step/2) % arpPat.length]);
      nextTime += beat;
      step++;
    }
  }, 120);
}

/* --- mute toggle --- */
function setupMute(){
  const btn = document.getElementById('muteBtn');
  btn.addEventListener('click', (e)=>{
    e.stopPropagation();
    soundOn = !soundOn;
    if(musicGain) musicGain.gain.linearRampToValueAtTime(soundOn?0.5:0.0, AC.currentTime+0.2);
    btn.textContent = soundOn ? "♪ SOUND: ON" : "♪ SOUND: OFF";
  });
}

const AGENT = "TILFORD";
const AGENT_ID = "CT-043";
// May 30 2026, 3:00 PM Eastern (EDT, UTC-4)
const MISSION_TIME = new Date("2026-05-30T15:00:00-04:00").getTime();
// When the page flips to MISSION COMPLETE and the photo album unlocks.
// Currently 4:01 PM Eastern on May 30.
const COMPLETE_TIME = new Date("2026-05-30T16:01:00-04:00").getTime();

const msgEl = document.getElementById('msg');
const now = Date.now();

/* ---------- BEFORE / DURING MISSION: standby + countdown ---------- */
const preLines = [
  {t:"ACCESS GRANTED\n", cls:"big"},
  {t:"\nWelcome, Agent " + AGENT + ".\n", cls:""},
  {t:"AGENT ID: " + AGENT_ID + "  //  CLEARANCE LEVEL 04\n", cls:""},
  {t:"Your mission begins in:\n", cls:""}
];

/* ---------- AFTER MISSION: mission complete + album ---------- */
const postLines = [
  {t:"MISSION COMPLETE\n", cls:"big"},
  {t:"\nWelcome back, CORE 04.\n", cls:""},
  {t:"AGENT " + AGENT + "  //  ID: " + AGENT_ID + "\n", cls:""},
  {t:"Operation LEVEL 10 has officially concluded.\n", cls:""},
  {t:"\nThe Mind Factory Agency recognizes the teamwork, intelligence, and determination demonstrated throughout the mission.\n", cls:""},
  {t:"\nClassified mission files and memories have now been unlocked.\n", cls:""}
];

// Preview override: add ?preview=done (mission complete) or ?preview=pre (countdown) to the URL
const _params = new URLSearchParams(location.search);
const _pv = _params.get('preview');
const isComplete = (_pv === 'done') ? true
                 : (_pv === 'pre')  ? false
                 : (now >= COMPLETE_TIME);
const lines = isComplete ? postLines : preLines;

let li = 0, ci = 0;
function type(){
  if(li >= lines.length){
    if(isComplete){
      document.getElementById('albumBtn').classList.add('show');
    } else {
      document.getElementById('countdown-wrap').style.display = "block";
      startCountdown();
    }
    return;
  }
  const obj = lines[li];
  // render "big" lines with class
  if(ci === 0 && obj.cls === "big"){
    // type into a span so we can style it
    const span = document.createElement('span');
    span.className = "big";
    msgEl.appendChild(span);
    obj._node = span;
  }
  if(ci < obj.t.length){
    const ch = obj.t[ci];
    if(obj.cls === "big" && obj._node){
      obj._node.textContent += ch;
    } else {
      msgEl.appendChild(document.createTextNode(ch));
    }
    if(ch.trim() !== "") clickSound();   // click on visible chars
    ci++;
    setTimeout(type, 34);
  } else {
    if(obj.t.trim() !== "") dingSound();  // ding at line end
    li++; ci = 0;
    setTimeout(type, 200);
  }
}
function beginSequence(){
  const gate = document.getElementById('startGate');
  gate.style.display = "none";
  document.getElementById('muteBtn').classList.add('show');
  document.getElementById('badgeWrap').classList.add('show');  // show badge right away
  initAudio();
  if(AC.state === 'suspended') AC.resume();
  startMusic();
  setupMute();
  setTimeout(type, 350);
}
window.addEventListener('load', ()=>{
  document.getElementById('startGate').addEventListener('click', beginSequence, {once:true});
});

function startCountdown(){
  const cd = document.getElementById('countdown');
  function tick(){
    let diff = MISSION_TIME - Date.now();
    if(diff <= 0){
      cd.innerHTML = "MISSION LIVE";
      document.querySelector('.cd-labels').style.display = "none";
      return;
    }
    const d=Math.floor(diff/86400000);diff-=d*86400000;
    const h=Math.floor(diff/3600000);diff-=h*3600000;
    const m=Math.floor(diff/60000);diff-=m*60000;
    const s=Math.floor(diff/1000);
    const p=n=>String(n).padStart(2,'0');
    cd.textContent=`${p(d)}:${p(h)}:${p(m)}:${p(s)}`;
  }
  tick();
  setInterval(tick,1000);
}
</script>
</body>
</html>
